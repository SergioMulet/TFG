name: 'CodeQL Analysis'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  detect-changes:
    name: Detect changed languages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      languages: ${{ steps.set.outputs.languages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'main-server/**'
              - 'pre/**'
            js:
              - 'mobile-app/**'
              - 'web-application/**'
              - 'pre/**'

      - name: Build language list
        id: set
        shell: bash
        run: |
          languages='[]'
          if [ "${{ steps.filter.outputs.go }}" == "true" ]; then
            languages=$(echo "$languages" | jq -c '. + ["go"]')
          fi
          if [ "${{ steps.filter.outputs.js }}" == "true" ]; then
            languages=$(echo "$languages" | jq -c '. + ["javascript-typescript"]')
          fi
          echo "languages=$languages" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze Code
    needs: detect-changes
    if: needs.detect-changes.outputs.languages != '[]'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect-changes.outputs.languages) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Build Go Backend
        if: matrix.language == 'go'
        run: |
          cd ./main-server
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
